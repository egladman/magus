<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13171f" media="(prefers-color-scheme: dark)">
  <meta name="generator" content="magus">
  <title>magus console</title>
  <meta name="description" content="The magus native console: a tabbed, tiling app that hosts the log viewer, graph explorer, dashboard, and activity trail as live lenses on the daemon over loopback.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <!-- PatternFly Core: the PF base + component sheets, then the console's PF-native token layer
       (tokens.css) that squares the corners, points the fonts at a system stack, and defines the
       --console-* semantic slots. Then console.css (the shell rules) and overrides.css. The
       Pico-era sheets (pico/site/theme/ui-panels) were removed at the W4 cutover; the console now
       runs on PatternFly alone. -->
  <link rel="stylesheet" href="./patternfly.css">
  <link rel="stylesheet" href="./tokens.css">
  <link rel="stylesheet" href="./console.css">
  <!-- The one small, ID-scoped escape hatch for the shell bits PatternFly has no component for
       (the status-bar frame, the floating gear position, the connection dot). Loaded LAST so its
       ID rules win. See src/styles/overrides.css. -->
  <link rel="stylesheet" href="./overrides.css">
  <script src="./theme.js"></script>
</head>
<!-- The console is a self-contained app, not a page in a site: NO site nav, NO brand mark. The title
     bar (#console-titlebar) is a masthead-style row: the tab strip fills it (console.js fills
     #console-tabs) and a right-aligned control group (#console-actions) holds the settings gear -
     the masthead/toolbar idiom, not a floating corner button. console.js mounts a surface per tab/pane
     into #console-outlet and swaps the active tab's status bar into the empty #console-statusbar footer.
     Do NOT put the status-bar ids (#console-conn etc.) in the footer statically - console.js creates
     them per tab. The title bar is a Window-Controls-Overlay drag region (-webkit-app-region, console.css);
     every interactive child opts back out to no-drag so tabs/gear stay clickable in the installed PWA. -->
<body data-console-app data-console-fill>
  <header id="console-titlebar">
    <div id="console-tabs"></div>
    <!-- Title-bar-right control group: PatternFly plain (borderless) icon Buttons sitting ON the tab row
         (command bar, applications, reference, settings). The settings gear opens the Settings
         surface as a tab; console.js's startConsole() wires it. -->
    <div id="console-actions">
    <!-- Command bar trigger: opens the dmenu-style runner (also mod+k). A plain icon button, so the
         command bar is discoverable without knowing the chord. console.js's startConsole() wires it to
         commandBar.open() and stamps the effective chord into the tooltip. -->
    <button id="console-commandbar-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-haspopup="dialog" aria-controls="command-bar" aria-label="Command bar" title="Command bar">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.8-3.8"/></svg></span>
    </button>
    <!-- Panes menu: split and close the tiled panes from the UI. Tiling used to be chord-only, which made
         it unreachable on a phone; every item here dispatches the SAME command id its keybinding does, and
         initPaneMenu() stamps the effective chord in so the menu also teaches the shortcut. Focus is
         deliberately absent - tapping a pane already focuses it, on touch and desktop alike. -->
    <button id="console-panes-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="console-panesmenu" aria-expanded="false" aria-haspopup="true" aria-label="Panes" title="Panes">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span>
    </button>
    <div class="pf-v6-c-menu" id="console-panesmenu" hidden aria-label="Panes">
      <div class="pf-v6-c-menu__content">
        <ul class="pf-v6-c-menu__list" role="menu">
          <li class="pf-v6-c-menu__list-item" role="none">
            <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-command="console.pane.split"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Split pane</span><span class="console-panesmenu__chord" data-chord aria-hidden="true"></span></span></button>
          </li>
          <li class="pf-v6-c-menu__list-item" role="none">
            <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-command="console.pane.splitDown"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Split pane down</span><span class="console-panesmenu__chord" data-chord aria-hidden="true"></span></span></button>
          </li>
        </ul>
        <hr class="pf-v6-c-divider" role="separator" />
        <ul class="pf-v6-c-menu__list" role="menu">
          <li class="pf-v6-c-menu__list-item" role="none">
            <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-command="console.tab.close"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Close pane or tab</span><span class="console-panesmenu__chord" data-chord aria-hidden="true"></span></span></button>
          </li>
        </ul>
      </div>
    </div>
    <!-- Applications menu: a PatternFly Menu popover (like the settings gear). Each row is TWO actions,
         the same split the launcher cards use: clicking the row opens the app as a TAB (single-instance -
         it focuses the tab if already open), and the trailing icon opens it in its own window. Opening a
         new OS window was the row's default before, which surprised people into stray windows. Wired by
         console.js's initAppMenu() (open/close, aria-expanded, Escape, click-outside, focus return). -->
    <button id="console-appmenu-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="console-appmenu" aria-expanded="false" aria-haspopup="true" aria-label="Applications" title="Applications">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.4"/><rect x="14" y="3" width="7" height="7" rx="1.4"/><rect x="3" y="14" width="7" height="7" rx="1.4"/><rect x="14" y="14" width="7" height="7" rx="1.4"/></svg></span>
    </button>
    <div class="pf-v6-c-menu" id="console-appmenu" hidden aria-label="Applications">
      <div class="pf-v6-c-menu__content">
        <section class="pf-v6-c-menu__group">
          <h3 class="pf-v6-c-menu__group-title console-appmenu__group-title" aria-hidden="true">Applications</h3>
          <ul class="pf-v6-c-menu__list" role="menu">
            <li class="pf-v6-c-menu__list-item" role="none">
              <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-app-open="logs"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Log Viewer</span></span></button>
            </li>
            <li class="pf-v6-c-menu__list-item" role="none">
              <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-app-open="graph"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Graph Explorer</span></span></button>
            </li>
            <li class="pf-v6-c-menu__list-item" role="none">
              <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-app-open="dashboard"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Dashboard</span></span></button>
            </li>
            <li class="pf-v6-c-menu__list-item" role="none">
              <button class="pf-v6-c-menu__item" role="menuitem" type="button" data-app-open="activity"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Activity Trail</span></span></button>
            </li>
          </ul>
        </section>
        <hr class="pf-v6-c-divider" role="separator" />
        <ul class="pf-v6-c-menu__list" role="menu">
          <li class="pf-v6-c-menu__list-item" role="none">
            <a class="pf-v6-c-menu__item" role="menuitem" href="../documentation/"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Documentation</span></span></a>
          </li>
        </ul>
      </div>
    </div>
    <button id="console-refbtn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="console-refdrawer" aria-expanded="false" aria-label="Reference" title="Reference">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22.5z"/><path d="M4 19.5V4.5"/></svg></span>
    </button>
    <!-- The settings gear opens the Settings surface as a tab (single-instance: console.js focuses it
         if already open). It is a plain trigger, not a popover anchor - the old #settings-panel dropdown
         (refresh rate / daemon host / theme cycle) was retired when those controls moved onto the
         Settings surface. console.js's startConsole() wires the click to open("settings"). -->
    <button id="settings-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-label="Settings" title="Settings">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    </button>
    </div>
  </header>
  <!-- The tab outlet is a PatternFly Drawer (pf-m-panel-right): the tab surfaces mount into the
       __content, and the Reference panel is the __panel. Opening toggles pf-m-expanded. PINNING
       toggles pf-m-inline (initRefDrawer): pinned = docked inline, which INSETS the content (the
       panel snaps the layout to fit and the surfaces reflow narrower); unpinned = an overlay that
       floats over the full-width content and dismisses on Escape / outside-click. console.js appends
       one pane per tab into #console-outlet-content; initRefDrawer() drives the panel. The title-bar
       Reference button (#console-refbtn) toggles it; pinned it stays open across tab switches
       (persisted). PF Drawer does not dim - there is no backdrop by design. -->
  <main id="console-outlet">
    <div id="console-refdrawer" class="pf-v6-c-drawer pf-m-panel-right">
      <div class="pf-v6-c-drawer__main">
        <div id="console-outlet-content" class="pf-v6-c-drawer__content"></div>
        <div id="console-refpanel" class="pf-v6-c-drawer__panel pf-m-resizable" role="region" aria-label="Reference" aria-hidden="true">
          <div id="console-refsplitter" class="pf-v6-c-drawer__splitter pf-m-vertical" role="separator" tabindex="0" aria-orientation="vertical" aria-label="Resize the reference panel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="30">
            <div class="pf-v6-c-drawer__splitter-handle" aria-hidden="true"></div>
          </div>
          <div class="pf-v6-c-drawer__panel-main">
          <div class="pf-v6-c-drawer__body">
            <div class="pf-v6-c-drawer__head">
              <span class="console-shell-refdrawer__title">Reference</span>
              <div class="pf-v6-c-drawer__actions">
                <button id="console-refpin" class="pf-v6-c-button pf-m-plain" type="button" aria-pressed="false" aria-label="Pin the reference panel" title="Pin">
                  <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 17v5"/><path d="M9 3h6l-1 7 3 3H7l3-3z"/></svg></span>
                </button>
                <div class="pf-v6-c-drawer__close">
                  <button id="console-refclose" class="pf-v6-c-button pf-m-plain" type="button" aria-label="Close the reference panel" title="Close">
                    <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="pf-v6-c-drawer__body">
            <!-- Documentation search: reuses the docs site's prebuilt search-index.json and its
                 Datadog-style query grammar (ported to src/lib/docsearch.ts). Results open in a
                 new tab; degrades to a note when the docs index is not reachable (standalone dev).
                 initRefDrawer() wires the input (#console-refsearch-input), results list, and note. -->
            <div class="console-shell-refsearch">
              <div class="pf-v6-c-text-input-group">
                <div class="pf-v6-c-text-input-group__main pf-m-icon">
                  <span class="pf-v6-c-text-input-group__text">
                    <span class="pf-v6-c-text-input-group__icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
                    <input id="console-refsearch-input" class="pf-v6-c-text-input-group__text-input" type="text" spellcheck="false" autocomplete="off" placeholder="Search the docs..." aria-label="Search the documentation" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="console-refsearch-results">
                  </span>
                </div>
              </div>
              <p id="console-refsearch-note" class="console-shell-refsearch__note" hidden></p>
              <ul id="console-refsearch-results" class="console-shell-refsearch__results" role="listbox" aria-label="Search results" hidden></ul>
            </div>
            <div id="console-refdrawer-body" class="console-shell-refdrawer__body"></div>
          </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer id="console-statusbar"></footer>

  <script type="module" src="./console.js"></script>
</body>
</html>
