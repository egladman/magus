<main class="console-dashboard-main" id="dash-main">
    <!-- Live panels (hidden until the first status frame arrives). Every tile inside is
         built in TypeScript (js/dashboard/tiles/*) and mounted here by main.ts - the tile
         owns its own DOM subtree, so adding a metric family is a new tile module, not new
         markup. This container is intentionally empty. -->
    <div id="dash-panels" hidden></div>

    <!-- Connect state: the dashboard's front door, shown until a live status frame arrives. A PatternFly
         EmptyState: an icon, a title/body, and the connect affordances (start command, demo, resume) in
         the footer. It does NOT list the sibling apps - the launcher already surfaces those cards
         whenever there are no tabs, so repeating them here was redundant. -->
    <div class="pf-v6-c-empty-state" id="dash-connect" data-dash-connect>
      <div class="pf-v6-c-empty-state__content">
        <div class="pf-v6-c-empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <h1 class="pf-v6-c-empty-state__title-text" id="dash-connect-title">No daemon connected</h1>
        <!-- The same two "ways" out of the cold state every other surface offers (the log viewer is the
             pattern): a command to go live, or the demo. A real BUTTON for the demo, not a sentence with
             a link buried in it - it is one of the two things to do here, so it looks like the other one.
             The loopback/privacy note that used to sit here now lives in the Reference panel: it is true
             of the whole console, not of this screen, and it was the last thing anyone needed while
             staring at "no daemon". -->
        <div class="pf-v6-c-empty-state__body">
          <p id="dash-connect-sub">Connect a running daemon to stream this dashboard's pool, cache, and health.</p>
          <div class="pf-v6-c-empty-state__actions" data-empty-ways>
            <div data-empty-way>
              <span data-empty-way-label>Connect a daemon</span>
              <pre data-empty-cmd><code>magus server start</code></pre>
              <span data-empty-hint>Then open the live link it prints.</span>
            </div>
            <div data-empty-way>
              <span data-empty-way-label>Try the demo</span>
              <button type="button" id="dash-demo-btn" class="pf-v6-c-button pf-m-primary"><span class="pf-v6-c-button__text">See the demo</span></button>
              <span data-empty-hint>Sample data, no daemon needed.</span>
            </div>
          </div>
        </div>

        <!-- Resume: only appears once a host is remembered, so it stays out of the first-run screen. -->
        <div class="pf-v6-c-empty-state__footer">
          <div data-connect-panel>
            <form id="dash-resume" hidden data-resume>
              <div data-resume-row>
                <span class="pf-v6-c-form-control">
                  <input type="text" id="dash-resume-host" placeholder="127.0.0.1:7391" spellcheck="false" autocomplete="off" aria-label="Daemon host and port">
                </span>
                <button type="submit" class="pf-v6-c-button pf-m-primary"><span class="pf-v6-c-button__text">Reconnect</span></button>
              </div>
              <button type="button" class="pf-v6-c-button pf-m-link pf-m-inline" id="dash-resume-forget"><span class="pf-v6-c-button__text">Forget this daemon</span></button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
