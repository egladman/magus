<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13171f" media="(prefers-color-scheme: dark)">
  <meta name="generator" content="magus">
  <title>magus console</title>
  <meta name="description" content="The magus native console: a tabbed, tiling app that hosts the log viewer, graph explorer, dashboard, and activity trail as live lenses on the daemon over loopback.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="stylesheet" href="./assets/pico.min.css">
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./site.css">
  <link rel="stylesheet" href="./ui-panels.css">
  <link rel="stylesheet" href="./console.css">
  <script src="./theme.js"></script>
</head>
<!-- The console is a self-contained app, not a page in a site: NO site nav, NO brand mark. The title
     bar is just the tab strip (console.js fills #console-tabs); the settings gear FLOATS in the corner
     (#console-actions), not inside a bar; console.js mounts a surface per tab/pane into #console-outlet
     and swaps the active tab's status bar into the empty #console-statusbar footer. Do NOT put the
     status-bar ids (#console-conn etc.) in the footer statically - console.js creates them per tab. -->
<body class="console-app console-fill">
  <header id="console-titlebar"><div id="console-tabs"></div></header>
  <main id="console-outlet" class="container-fluid"></main>
  <footer id="console-statusbar" class="console-statusbar"></footer>

  <!-- Floating settings: a single round gear pinned to the corner, with its popover. console.js's
       initConsoleSettings() wires it; theme.js wires the theme cycle inside. -->
  <div id="console-actions">
    <button id="settings-btn" class="console-fab" type="button" aria-controls="settings-panel" aria-expanded="false" aria-haspopup="true" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="settings-panel" id="settings-panel" hidden aria-label="Settings">
      <h2 class="settings-title">Settings</h2>
      <p class="settings-note">Saved locally.</p>
      <label class="settings-row"><span>Refresh rate</span><select id="settings-poll"><option value="5000">5s</option><option value="10000">10s</option><option value="20000">20s</option><option value="60000">60s</option></select></label>
      <label class="settings-row"><span>Daemon host</span><input id="settings-host" type="text" placeholder="127.0.0.1:7391" spellcheck="false" autocomplete="off"></label>
      <div class="settings-row"><span>Theme</span><button type="button" id="theme-cycle" class="theme-cycle outline" aria-label="Color theme"><span class="theme-cycle-icon" aria-hidden="true"></span><span class="theme-cycle-label">Auto</span></button></div>
    </div>
  </div>

  <script type="module" src="./console.js"></script>
</body>
</html>
