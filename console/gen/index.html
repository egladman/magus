<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13171f" media="(prefers-color-scheme: dark)">
  <meta name="generator" content="magus">
  <title>magus console</title>
  <meta name="description" content="The magus native console: a tabbed, tiling app that hosts the log viewer, graph explorer, dashboard, and activity trail as live lenses on the daemon over loopback.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <!-- PatternFly Core: the PF base + component sheets, then the console's PF-native token layer
       (tokens.css) that squares the corners, points the fonts at a system stack, and defines the
       --console-* semantic slots. Then console.css (the shell rules) and overrides.css. The
       Pico-era sheets (pico/site/theme/ui-panels) were removed at the W4 cutover; the console now
       runs on PatternFly alone. -->
  <link rel="stylesheet" href="./patternfly.css">
  <link rel="stylesheet" href="./tokens.css">
  <link rel="stylesheet" href="./console.css">
  <!-- The one small, ID-scoped escape hatch for the shell bits PatternFly has no component for
       (the status-bar frame, the floating gear position, the connection dot). Loaded LAST so its
       ID rules win. See src/styles/overrides.css. -->
  <link rel="stylesheet" href="./overrides.css">
  <script src="./theme.js"></script>
</head>
<!-- The console is a self-contained app, not a page in a site: NO site nav, NO brand mark. The title
     bar (#console-titlebar) is a masthead-style row: the tab strip fills it (console.js fills
     #console-tabs) and a right-aligned control group (#console-actions) holds the settings gear -
     the masthead/toolbar idiom, not a floating corner button. console.js mounts a surface per tab/pane
     into #console-outlet and swaps the active tab's status bar into the empty #console-statusbar footer.
     Do NOT put the status-bar ids (#console-conn etc.) in the footer statically - console.js creates
     them per tab. The title bar is a Window-Controls-Overlay drag region (-webkit-app-region, console.css);
     every interactive child opts back out to no-drag so tabs/gear stay clickable in the installed PWA. -->
<body data-console-app data-console-fill>
  <header id="console-titlebar">
    <div id="console-tabs"></div>
    <!-- Title-bar-right control group: a PatternFly plain (borderless) icon Button (the gear) sitting
         ON the tab row, with a PatternFly Menu as its popover anchored under it (position in
         overrides.css). console.js's initConsoleSettings() wires #settings-btn/#settings-panel
         (open/close + aria-expanded); theme.js wires #theme-cycle inside. The controls keep their ids
         (#settings-poll/#settings-host/#theme-cycle) and the theme button keeps its
         .console-shell-themecycle__icon/.console-shell-themecycle__label spans (theme.js paints them). -->
    <div id="console-actions">
    <!-- Applications menu: a PatternFly Menu popover (like the settings gear) that links back to the
         sibling magus web apps - the documentation site and the playground. console.js's initAppMenu()
         wires #console-appmenu-btn/#console-appmenu (open/close, aria-expanded, Escape, click-outside,
         focus return). The items are plain links; clicking one navigates to that app. -->
    <button id="console-appmenu-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="console-appmenu" aria-expanded="false" aria-haspopup="true" aria-label="Applications" title="Applications">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.4"/><rect x="14" y="3" width="7" height="7" rx="1.4"/><rect x="3" y="14" width="7" height="7" rx="1.4"/><rect x="14" y="14" width="7" height="7" rx="1.4"/></svg></span>
    </button>
    <div class="pf-v6-c-menu" id="console-appmenu" hidden aria-label="Applications">
      <div class="pf-v6-c-menu__content">
        <ul class="pf-v6-c-menu__list" role="menu">
          <li class="pf-v6-c-menu__list-item" role="none">
            <a class="pf-v6-c-menu__item" role="menuitem" href="../documentation/"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Documentation</span></span></a>
          </li>
          <li class="pf-v6-c-menu__list-item" role="none">
            <a class="pf-v6-c-menu__item" role="menuitem" href="../playground/"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Playground</span></span></a>
          </li>
        </ul>
      </div>
    </div>
    <button id="console-refbtn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="console-refdrawer" aria-expanded="false" aria-label="Reference" title="Reference">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22.5z"/><path d="M4 19.5V4.5"/></svg></span>
    </button>
    <button id="settings-btn" class="pf-v6-c-button pf-m-plain" type="button" aria-controls="settings-panel" aria-expanded="false" aria-haspopup="true" aria-label="Settings" title="Settings">
      <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    </button>
    <div class="pf-v6-c-menu" id="settings-panel" hidden aria-label="Settings">
      <div class="pf-v6-c-menu__content">
        <form class="pf-v6-c-form pf-m-horizontal">
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label"><label class="pf-v6-c-form__label" for="settings-poll"><span class="pf-v6-c-form__label-text">Refresh rate</span></label></div>
            <div class="pf-v6-c-form__group-control">
              <span class="pf-v6-c-form-control"><select id="settings-poll"><option value="5000">5s</option><option value="10000">10s</option><option value="20000">20s</option><option value="60000">60s</option></select></span>
            </div>
          </div>
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label"><label class="pf-v6-c-form__label" for="settings-host"><span class="pf-v6-c-form__label-text">Daemon host</span></label></div>
            <div class="pf-v6-c-form__group-control">
              <span class="pf-v6-c-form-control"><input id="settings-host" type="text" placeholder="127.0.0.1:7391" spellcheck="false" autocomplete="off"></span>
            </div>
          </div>
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label"><span class="pf-v6-c-form__label"><span class="pf-v6-c-form__label-text">Theme</span></span></div>
            <div class="pf-v6-c-form__group-control">
              <button type="button" id="theme-cycle" class="pf-v6-c-button pf-m-secondary" aria-label="Color theme"><span class="pf-v6-c-button__icon console-shell-themecycle__icon" aria-hidden="true"></span><span class="pf-v6-c-button__text console-shell-themecycle__label">Auto</span></button>
            </div>
          </div>
        </form>
      </div>
    </div>
    </div>
  </header>
  <main id="console-outlet"></main>
  <footer id="console-statusbar"></footer>

  <!-- Reference panel: a right-side slide-out that shows the ACTIVE surface's reference/help
       sections (the graph explorer's query + search-syntax help, the log viewer's filter help).
       console.js's initRefDrawer() fills #console-refdrawer-body by cloning the active surface's
       [data-legacy-ref] blocks on open, wires the trigger (#console-refbtn), pin (#console-refpin),
       close (#console-refclose), the backdrop, and Escape. Pinned docks it beside the content;
       unpinned floats it over a dimming backdrop. Empty (display:none) until opened. -->
  <aside id="console-refdrawer" class="console-shell-refdrawer" aria-label="Reference" aria-hidden="true">
    <header class="console-shell-refdrawer__header">
      <span class="console-shell-refdrawer__title">Reference</span>
      <button id="console-refpin" class="pf-v6-c-button pf-m-plain pf-m-small" type="button" aria-pressed="false" aria-label="Pin the reference panel" title="Pin">
        <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 17v5"/><path d="M9 3h6l-1 7 3 3H7l3-3z"/></svg></span>
      </button>
      <button id="console-refclose" class="pf-v6-c-button pf-m-plain pf-m-small" type="button" aria-label="Close the reference panel" title="Close">
        <span class="pf-v6-c-button__icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
      </button>
    </header>
    <div id="console-refdrawer-body" class="console-shell-refdrawer__body"></div>
  </aside>
  <div id="console-refbackdrop" class="console-shell-refbackdrop" hidden></div>

  <script type="module" src="./console.js"></script>
</body>
</html>
