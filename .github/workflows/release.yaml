name: Release magus

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # create GitHub Releases and upload assets

jobs:
  binaries:
    name: Cross-compile & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Builds all five platform binaries (CGO_ENABLED=0, so no cross-compiler
      # needed), runs a reproducibility check on each, tarballs them, and
      # writes dist/SHA256SUMS. All in one mage call.
      - name: Build binaries
        run: go tool mage release:binaries

      - name: Sign SHA256SUMS
        env:
          MAGUS_SIGNING_KEY: ${{ secrets.MAGUS_SIGNING_KEY }}
        run: go tool mage release:sign dist/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magus-dist
          path: |
            dist/magus_*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
          if-no-files-found: error

  release:
    name: Publish release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: magus-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/magus_*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
          generate_release_notes: true

  image:
    name: Publish container image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # release:image builds linux/amd64+arm64, pushes semver tags to
      # ghcr.io/egladman/magus, and keyless-signs each tag with cosign.
      - name: Build, push & sign image
        run: go tool mage image:publish
