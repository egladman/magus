name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Go test suite under the race detector across linux/macOS/Windows so
  # cross-platform code paths (adopt, watch, cmd/magus/selfupdate) get
  # covered by every PR.
  tests:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Install LuaJIT
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)  sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config ;;
            macOS)  brew install luajit pkg-config ;;
          esac
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      # Windows has no LuaJIT package; use the pure-Go gopherlua backend there.
      - name: go test -race
        env:
          CGO_ENABLED: ${{ runner.os == 'Windows' && '0' || '1' }}
        run: go test -race -timeout=5m ./...

  # gopherbuzz is a separate module (replace directive) whose Value type has three
  # build-tagged representations. The default (NaN-box) is exercised above via the
  # workspace, but the safe/unsafe twins only get covered if we build and test them
  # explicitly. The buzz_safe twin is bounds-checked and behaviourally identical to
  # the unsafe one, so running both is what backs the "unsafe path is validated by
  # its safe twin" guarantee.
  gopherbuzz-reprs:
    name: gopherbuzz (value reprs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: test default (nanbox) + safe + unsafe
        working-directory: gopherbuzz
        run: |
          go test -timeout=5m ./...
          go test -tags buzz_safe -timeout=5m ./...
          go test -tags buzz_unsafe -timeout=5m ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      # Smoke fuzzers for 30s each per push. Real fuzzing happens in
      # OSS-Fuzz / a longer scheduled job; this gate just catches
      # regressions in the seed corpus and obvious crashes.
      - name: fuzz config.LoadFile
        run: go test -run=^$ -fuzz=FuzzLoadFile -fuzztime=30s ./config
      - name: fuzz watch.ParsePattern
        run: go test -run=^$ -fuzz=FuzzParsePattern -fuzztime=30s ./watch
      - name: fuzz watch.IgnorePatternsMatch
        run: go test -run=^$ -fuzz=FuzzIgnorePatternsMatch -fuzztime=30s ./watch
      - name: fuzz ci/github.Render
        run: go test -run=^$ -fuzz=FuzzRender -fuzztime=30s ./ci/github
      - name: fuzz cache.FuzzHashSpec
        run: go test -run=^$ -fuzz=FuzzHashSpec -fuzztime=30s ./cache
      - name: fuzz cache.FuzzReadManifest
        run: go test -run=^$ -fuzz=FuzzReadManifest -fuzztime=30s ./cache

  bench:
    name: benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Non-failing: regressions are visible in the artifact but do not
    # block PRs. Wire benchstat / a regression bot in a follow-up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go test -bench
        run: go test -run=^$ -bench=. -benchmem -benchtime=2s ./cache | tee bench.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-${{ github.sha }}
          path: bench.txt
          retention-days: 30

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8 # v6.2.0
        with:
          version: v1.64.8
          args: --config .golangci.yml ./...

  format:
    name: gofumpt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: install gofumpt
        run: go install mvdan.cc/gofumpt@latest
      - name: gofumpt check
        run: gofumpt -l . | tee /dev/stderr | (! read)

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: coverage (threshold 80%)
        run: go tool mage go:coverage
      - name: coverage profile
        run: go test -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload to Coveralls
        uses: shogo82148/actions-goveralls@v1
        with:
          path-to-profile: coverage.out

  image:
    name: container image (build smoke-test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install LuaJIT
        run: sudo apt-get update -q && sudo apt-get install -y libluajit-5.1-dev pkg-config
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        run: go tool mage image:build
