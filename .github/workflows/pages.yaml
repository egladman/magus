name: Pages

# Publish the committed static site (website/gen) to GitHub Pages.
#
# website/gen is committed AND drift-gated by the site project's `generate`
# target (CI fails if gen/ ever diverges from docs/ + README), so whatever is on
# main is always the rendered site. This workflow therefore just publishes those
# bytes — no magus, no TinyGo, no render step. It uses the Pages *artifact* path
# (not a gh-pages branch), so it points straight at the nested website/gen dir
# and nothing is duplicated into a second branch.

on:
  push:
    branches: [main]
    # Only redeploy when the published site (or this workflow) actually changes.
    paths:
      - 'website/gen/**'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

# Least privilege: read the repo, mint the Pages OIDC token, write the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never cancel an in-flight publish mid-upload.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Shallow checkout (depth 1) — we only publish the committed website/gen,
      # no git history needed.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # enablement: true turns Pages on (with the Actions source) the first time
      # this runs, so no manual Settings → Pages step is needed. If your org
      # blocks auto-enablement, enable it once with:
      #   gh api -X POST repos/egladman/magus/pages -f build_type=workflow
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      # Tar website/gen as-is and hand it to Pages. The site uses only relative
      # paths, so it serves correctly under the project subpath
      # (https://egladman.github.io/magus/).
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/gen

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
