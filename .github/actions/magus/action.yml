name: magus
description: >
  Invoke a magus subcommand, or merge per-shard run histories.

  Default mode (merge-history: false) runs `magus <command>`, setting
  MAGUS_SHARD/MAGUS_N_SHARDS first so shard-aware subcommands (e.g. `run`) emit
  ci.shard.total timing events without extra shell logic in the workflow.

  Merge mode (merge-history: true) ignores `command` and instead restores the
  prior run history, folds in every shard history this run uploaded
  (freshest-wins), and saves the merged result for the next run — the
  aggregation step of a sharded CI run. It is self-contained: it keys the cache
  by run and stages files under the runner temp dir, so the caller needs no
  history plumbing of its own.

inputs:
  command:
    description: >
      Full magus argv after `magus`
      (e.g. "ci github", "run ci pkg-a pkg-b", "affected ci --base origin/main").
      Required unless merge-history is true.
    required: false
    default: ''
  shard:
    description: Shard ID within this CI matrix run (e.g. "0"). Maps to MAGUS_SHARD.
    required: false
    default: ''
  n-shards:
    description: Total number of shards in this matrix run. Maps to MAGUS_N_SHARDS.
    required: false
    default: ''
  merge-history:
    description: >
      When "true", ignore `command` and merge the per-shard run histories this
      run's shards uploaded as `magus-history-*` artifacts into the persisted
      history.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Run magus
      if: inputs.merge-history != 'true'
      shell: bash
      env:
        MAGUS_SHARD:       ${{ inputs.shard }}
        MAGUS_N_SHARDS:    ${{ inputs.n-shards }}
        # Via env, not interpolation: inputs.command comes from directory names;
        # shell metacharacters would execute if templated into the run line.
        INPUT_COMMAND: ${{ inputs.command }}
      run: |
        if [ -z "$INPUT_COMMAND" ]; then
          echo "::error::magus action: command is required unless merge-history is true"; exit 1
        fi
        # Belt-and-braces: reject shell metacharacters (env indirection is the real fix).
        case "$INPUT_COMMAND" in
          *[\;\&\|\`\$\(\)\<\>\!\\]*) echo "::error::magus action: command contains shell metacharacters: $INPUT_COMMAND"; exit 1 ;;
        esac
        # Word-split is intentional here: INPUT_COMMAND is a space-separated argv.
        # shellcheck disable=SC2086
        magus $INPUT_COMMAND

    # --- merge-history mode --------------------------------------------------
    # Prior history is the base, then each shard's is folded in. The local path
    # is private to this action; the cache key (keyed by run) is what threads the
    # history from the shards through to the next run.
    - name: Restore previous run history
      if: inputs.merge-history == 'true'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ runner.temp }}/magus-history.json
        key: ${{ github.workflow }}-magus-history-v1-${{ github.run_id }}
        restore-keys: |
          ${{ github.workflow }}-magus-history-v1-

    - name: Download shard histories
      if: inputs.merge-history == 'true'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        path: ${{ runner.temp }}/shard-history
        pattern: magus-history-*

    - name: Merge histories
      if: inputs.merge-history == 'true'
      shell: bash
      run: |
        shopt -s nullglob
        files=("$RUNNER_TEMP"/shard-history/*/magus-history.json)
        [[ ${#files[@]} -gt 0 ]] || { echo "no shard histories; nothing to merge"; exit 0; }
        magus config history import --history "$RUNNER_TEMP/magus-history.json" "${files[@]}"

    - name: Save merged run history
      if: inputs.merge-history == 'true'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ runner.temp }}/magus-history.json
        key: ${{ github.workflow }}-magus-history-v1-${{ github.run_id }}
