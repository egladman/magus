name: Setup magus
description: >
  Install the magus binary into the runner tool cache ($RUNNER_TOOL_CACHE) and
  restore Go module, Go build, and mise tool caches. Until magus ships a packaged
  release, the binary is compiled from the checked-out source (a prebuilt release
  is installed instead when `version` is set) — either way it lands in the tool
  cache and on PATH, so every job step that follows can run `magus`.

inputs:
  version:
    description: >
      Release tag to install (e.g. v0.5.0). Empty string always builds from
      source using the checked-out code.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true  # caches ~/go/pkg/mod + ~/.cache/go-build keyed by go.sum

    - name: Restore mise tool cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.local/share/mise
          ~/.cache/mise
        # Exact-match only: no restore-keys fallback. A fallback across
        # branches lets a same-repo PR write a poisoned entry under the
        # runner.os-mise- prefix that another branch's job later restores.
        key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}

    - name: Restore magus binary cache
      id: magus-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ runner.tool_cache }}/magus/bin
        key: ${{ runner.os }}-magus-${{ inputs.version }}-${{ hashFiles('cmd/magus/**', '**', 'go.sum') }}

    - name: Install magus from release
      id: prebuilt
      if: steps.magus-cache.outputs.cache-hit != 'true' && inputs.version != ''
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        VERSION="${{ inputs.version }}"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
        BASE="https://github.com/egladman/magus/releases/download/${VERSION}"
        ASSET="magus_${VERSION}_${OS}_${ARCH}.tar.gz"
        TMP="$(mktemp -d)"
        trap 'rm -rf "${TMP}"' EXIT

        curl -fsSL "${BASE}/${ASSET}"   -o "${TMP}/${ASSET}"
        curl -fsSL "${BASE}/SHA256SUMS" -o "${TMP}/SHA256SUMS"

        cd "${TMP}"
        grep "${ASSET}" SHA256SUMS | sha256sum --check --status

        mkdir -p "$RUNNER_TOOL_CACHE/magus/bin"
        tar -xzf "${ASSET}" -C "$RUNNER_TOOL_CACHE/magus/bin" magus
        echo "magus: installed prebuilt ${VERSION} for ${OS}/${ARCH}" >&2

    - name: Build magus from source
      if: >
        steps.magus-cache.outputs.cache-hit != 'true' &&
        (inputs.version == '' || steps.prebuilt.outcome == 'failure')
      shell: bash
      run: |
        mkdir -p "$RUNNER_TOOL_CACHE/magus/bin"
        go build -o "$RUNNER_TOOL_CACHE/magus/bin/magus" ./cmd/magus
        echo "magus: built from source" >&2

    - name: Add magus to PATH
      shell: bash
      run: echo "$RUNNER_TOOL_CACHE/magus/bin" >> "$GITHUB_PATH"

    - name: Verify magus
      shell: bash
      run: magus version
