# Dev shorthand: a bare `mgs` runs the in-tree build. Active in interactive shells
# where `mise activate` is running (bash/zsh/fish), auto-set on entering this repo.
[shell_alias]
mgs = "go run ./cmd/magus"

[tools]
go = "1.26.4"
# node + markdownlint-cli back the markdown spell (md.markdownlint), so the lint gate
# resolves them from mise, not a stray global. Markdown has no formatter: TypeScript/CSS
# use biome (a pnpm devDep per project), and prettier was dropped rather than kept only to
# format markdown, which biome does not support.
node = "24"
# pnpm (not npm) is the website's package manager: it enforces a minimum release
# age on installs (see website/.npmrc minimum-release-age, 10 days) so a freshly
# published - possibly compromised - version is never pulled into a build.
pnpm = "10.33.0"
"npm:markdownlint-cli" = "0.49.0"
# esbuild bundles + minifies the website's client JS (js/theme.js -> gen/theme.js,
# js/main.js -> gen/main.js) and minifies its CSS, in the website generate target.
# Pinned EXACTLY: a version bump silently rewrites every gen/*.js|css byte and trips
# the drift gate, so bumping means "regen + commit gen/" in the same change.
"npm:esbuild" = "0.25.5"

# typos is the docs prose spell-checker (md.typos / md.typos:rw), wired into the
# markdown spell. Corrections-based: it flags only known misspellings from its
# curated typo->fix map, so domain terms like gopherbuzz/magusfile/TinyGo never
# trip it and there's essentially nothing to maintain. See _typos.toml for the
# minimal exclude list.
"aqua:crate-ci/typos" = "1.28.4"
# tinygo + binaryen (wasm-opt) back the website's build-playground target, which
# compiles cmd/buzz-playground to website/playground/buzz.wasm. TinyGo >= 0.40 is
# required; wasm-opt runs as tinygo's post-link optimization step.
tinygo = "0.41.1"
"aqua:WebAssembly/binaryen" = "129"
# buf drives the protobuf API contract between magus and the website log viewer
# (proto/magus/runlog/v1). The buf spell (spells/buf) forks it for generate/lint/
# breaking; buf-breaking gates the wire contract in ci. Go codegen uses protoc-gen-go
# (proto/buf.gen.yaml); JS uses @bufbuild/protoc-gen-es (website pnpm dep).
"aqua:bufbuild/buf" = "1.58.0"
# SCIP code-symbol indexers the language spells' `scip` op forks (go, ts) to feed the
# knowledge graph - `magus graph build` and the daemon's background auto-indexer run
# them. Installed as PATH bins so the ops fork them directly. Only the languages this
# repo actually has (Go at the root, TypeScript in website/); add scip-python /
# rust-analyzer if a project of that language appears. NOTE: pin these to exact versions
# (mise use go:.../scip-go@<ver>, npm:@sourcegraph/scip-typescript@<ver>) to match the
# repo's exact-pin convention; left at latest here because the current release could not
# be verified offline.
"go:github.com/scip-code/scip-go/cmd/scip-go" = "latest"
"npm:@sourcegraph/scip-typescript" = "latest"
