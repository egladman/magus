syntax = "proto3";

// Package magus.job.v1 is the versioned wire contract for the daemon's CONTROL surface: the
// mutating sibling of the read-only console services (magus.activity.v1, magus.status.v1,
// magus.viewer.v1, magus.metrics.v1). Its RPCs submit background maintenance jobs - reconcile
// the knowledge graph, rotate the activity trail, clear the build cache - through the same
// fire-and-forget, coalescing mechanism the daemon uses for any adopted work, so an identical
// in-flight job is never started twice. Every RPC requires the daemon bearer token; the service
// is mounted behind the same guard as /mcp and never served unauthenticated. buf-breaking gates
// this file: fields and RPCs may be ADDED (old clients ignore unknown fields), never renumbered
// or removed. The response carries a full metadata snapshot (last run, current size) so a client
// renders a job's state without a second call.
package magus.job.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// JobService is the daemon's control surface for background maintenance jobs. Trigger RPCs
// submit a job and return immediately; ListJobs reports every job's state. Read surfaces stay on
// the per-domain services - this one only mutates.
service JobService {
  // SyncGraph reconciles the knowledge graph to current source (rebuild and reindex).
  rpc SyncGraph(SyncGraphRequest) returns (SubmitJobResponse);
  // RotateActivities trims the activity trail to its cap and drops orphaned payload blobs.
  rpc RotateActivities(RotateActivitiesRequest) returns (SubmitJobResponse);
  // ClearCache invalidates cached build entries for the workspace.
  rpc ClearCache(ClearCacheRequest) returns (SubmitJobResponse);
  // RotateLogs trims the invocation run-log journals back to their cap.
  rpc RotateLogs(RotateLogsRequest) returns (SubmitJobResponse);
  // ListJobs returns every registered job with its running state, last run, and target size.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
}

// SubmitState is the disposition of a trigger RPC. Both values are SUCCESS outcomes returned in a
// normal response (not an error): coalescing an identical job is expected, not a failure. Real
// failures (unknown job, missing token, internal error) use the transport's error codes instead.
enum SubmitState {
  SUBMIT_STATE_UNSPECIFIED = 0;
  SUBMIT_STATE_SUBMITTED = 1;       // a new background job was started
  SUBMIT_STATE_ALREADY_RUNNING = 2; // an identical job was already in flight; coalesced, not restarted
}

// SubmitJobResponse is returned by every trigger RPC: whether the job started or coalesced, the
// invocation id and console deep-link for its live log, and the job's full metadata snapshot so a
// caller can render "last rotated 3m ago, trail 2.1 MB" without a follow-up call.
message SubmitJobResponse {
  SubmitState state = 1;
  string invocation_id = 2; // the running job's invocation id (the new one, or the coalesced one)
  string console_url = 3;   // deep-link to this invocation's live log; empty when no console is mounted
  JobInfo job = 4;          // the job's descriptor plus its last-run and current-size metadata
}

// JobInfo is the full picture of one job: what it is, whether an instance is running now, its
// most recent completed run, and the current magnitude of the resource it maintains.
message JobInfo {
  string name = 1;         // stable job name, e.g. "rotate-activities"
  string description = 2;
  bool running = 3;        // an instance is in flight right now
  JobRun last_run = 4;     // most recent completed run; unset if the job has not run this daemon session
  ResourceSize target = 5; // current size of what the job operates on (trail, cache, or logs)
}

// JobRun is one completed execution of a job.
message JobRun {
  string invocation_id = 1;
  google.protobuf.Timestamp finished_at = 2;
  google.protobuf.Duration duration = 3;
  bool ok = 4;          // false when the run errored
  string error = 5;     // error text when ok is false

  // Per-run deltas, populated only by jobs that measure them (a rotate reports what it dropped).
  // Zero when the job does not report a delta yet - additive, so a job starts reporting later
  // without a contract change.
  int64 items_removed = 6;   // e.g. trail events pruned, cache entries invalidated
  int64 bytes_reclaimed = 7; // on-disk bytes freed
}

// ResourceSize is the current magnitude of a job's target resource, for a caller to show how much
// there is to maintain (and to judge whether a rotate/clear is worth running).
message ResourceSize {
  int64 bytes = 1; // total on-disk bytes
  int64 count = 2; // logical item count (trail events, cached entries, run logs)
}

message SyncGraphRequest {}
message RotateActivitiesRequest {}
message ClearCacheRequest {}
message RotateLogsRequest {}

message ListJobsRequest {}
message ListJobsResponse {
  repeated JobInfo jobs = 1; // every registered job, in a stable order
}
