syntax = "proto3";

// Package magus.audit.v1 is the versioned wire contract for the magus audit trail: a
// time-ordered record of consequential actions taken against a workspace or its daemon,
// for accountability. It is a sibling of the magus tool-page contracts (magus.viewer.v1,
// magus.status.v1). It is deliberately NOT the execution journal (magus.viewer.v1, what a
// build ran) nor metrics (magus.metrics.v1, aggregate counters): audit answers "who did
// what, and did it succeed". The first and today only source is MCP tool calls; the enum
// reserves the other governance sources the envelope is built to hold (config mutations,
// connector-token lifecycle, sandbox denials) so they slot in with no schema change.
// buf-breaking gates this file. The on-disk store is JSONL (one AuditEvent per line, as
// protojson) next to a content-addressed payload blob store; this proto is the WIRE format.
package magus.audit.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "magus/query/v1/query.proto";

// Kind classifies the audited action by its source. MCP_TOOL_CALL is the only kind emitted
// today; the rest name the governance sources this envelope is designed to carry, so a
// reader can switch on kind without the schema changing when they begin emitting.
enum Kind {
  KIND_UNSPECIFIED = 0;
  KIND_MCP_TOOL_CALL = 1;   // an agent invoked an MCP tool over the daemon
  KIND_CONFIG_CHANGE = 2;   // reserved: a `magus config set` mutation (not yet emitted)
  KIND_TOKEN_LIFECYCLE = 3; // reserved: a connector token minted or revoked (not yet emitted)
  KIND_SANDBOX_DENIAL = 4;  // reserved: a target attempted a disallowed filesystem action (not yet emitted)
}

// Outcome is how the action ended.
enum Outcome {
  OUTCOME_UNSPECIFIED = 0;
  OUTCOME_OK = 1;
  OUTCOME_ERROR = 2;
}

// AuditEvent is one recorded action - the atom of the trail. The envelope (time, actor,
// kind, action, outcome) is common to every kind; the payload refs point into the audit
// blob store (fetched via GetPayload) so a large request/response body never bloats the
// line. For an MCP tool call: actor is the agent id, action is the tool name, request is
// the arguments, response is the result.
message AuditEvent {
  google.protobuf.Timestamp time = 1;    // when the action occurred
  Kind kind = 2;
  string actor = 3;                      // who: an agent id, "cli", a user
  string action = 4;                     // the specific action: a tool name, a config key
  Outcome outcome = 5;
  string error = 6;                      // error text when outcome is OUTCOME_ERROR
  google.protobuf.Duration duration = 7; // wall-clock, on call-shaped actions

  // Content-addressed payload refs, provenance-prefixed (an MCP payload is "mcp<hash>").
  // Empty when the action has no such body. Resolve with GetPayload.
  string request_ref = 8;
  string response_ref = 9;
  string preview = 10;                   // opening characters of the response, for list views
  int64 request_bytes = 11;
  int64 response_bytes = 12;
}

// AuditService serves the trail to a viewer, mirroring magus.viewer.v1's shape: List a page
// of events (newest first), Get a payload blob by ref. Mounted on the console's human-facing
// API surface, never under /mcp (which is the agent protocol surface).
service AuditService {
  // ListAudit returns a page of recent audit events, newest first, narrowed by filter.
  rpc ListAudit(ListAuditRequest) returns (ListAuditResponse);
  // GetPayload returns a stored request or response body by its ref (from an AuditEvent).
  rpc GetPayload(GetPayloadRequest) returns (GetPayloadResponse);
}

// AuditQuery narrows the listing server-side. Fields AND together; repeated values within a
// field OR; the time window bounds it.
message AuditQuery {
  repeated Kind kinds = 1;              // restrict to these action kinds
  repeated string actors = 2;          // restrict to these actors
  repeated string actions = 3;         // restrict to these actions (e.g. tool names)
  magus.query.v1.TimeRange time = 4;   // action-time window
}

message ListAuditRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];
  string page_token = 2;
  AuditQuery filter = 3;
}
message ListAuditResponse {
  repeated AuditEvent events = 1;
  string next_page_token = 2;  // set when more events remain
}

message GetPayloadRequest {
  // A provenance-prefixed content ref: a short lowercase source tag followed by hex.
  string ref = 1 [(buf.validate.field).string.pattern = "^[a-z]{2,8}[0-9a-f]+$"];
}
message GetPayloadResponse {
  bytes body = 1;
  int64 bytes = 2;
}
