syntax = "proto3";

// Package magus.settings.v1 is the versioned wire contract for local, per-machine app
// preferences a PWA persists (theme, tool defaults, ...). Stored in the local cache;
// it never leaves the machine. A sibling of magus.viewer.v1 / magus.status.v1.
//
// HUMAN-ONLY: UpdatePreferences (and any future config write) must be served ONLY on
// the loopback web transport a human drives - never exposed as an MCP tool. An agent
// that could rewrite local settings/config could weaken the sandbox or trust set, so
// writes are gated to a human at the keyboard (loopback + CORS + token + not-in-MCP).
package magus.settings.v1;

import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";

// Theme is the app color scheme preference.
enum Theme {
  THEME_UNSPECIFIED = 0;
  THEME_AUTO = 1;   // follow the OS
  THEME_LIGHT = 2;
  THEME_DARK = 3;
}

// Preferences are the local app/UI preferences. Kept minimal now; fields grow as use
// cases land (additive and backward-compatible under buf-breaking).
message Preferences {
  Theme theme = 1;
}

service SettingsService {
  // GetPreferences returns the stored preferences (defaults when none exist yet).
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
  // UpdatePreferences writes the preferences to the local cache. allow_missing=true
  // upserts (creates them when none exist) - the AIP-134 update pattern; update_mask
  // limits the write to the named fields, leaving the rest untouched.
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
}

message GetPreferencesRequest {}
message GetPreferencesResponse {
  Preferences preferences = 1;
}

message UpdatePreferencesRequest {
  Preferences preferences = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2;  // fields to write; empty = all set fields
  bool allow_missing = 3;                       // create if not present (upsert)
}
message UpdatePreferencesResponse {
  Preferences preferences = 1;
}
