syntax = "proto3";

// Package magus.status.v1 is the versioned wire contract for magus's status/dashboard
// view, scoped to LIVE state: overall health, the concurrency pool (capacity/running/
// queued slots), what is running right now - the running targets, their workspace, and
// how long they have run - and live cache ACTIVITY (hit/miss/error tallies + real on-disk
// size). Static CONFIG (telemetry, the cache cap/immutability, build flags) is deliberately
// NOT here; that is `magus status`/config, not "what is happening." Backs a native-feeling
// /dashboard. A sibling of magus.viewer.v1. buf-breaking gates this file.
package magus.status.v1;

import "google/protobuf/timestamp.proto";

// Health is the at-a-glance rollup a dashboard shows.
enum Health {
  HEALTH_UNSPECIFIED = 0;
  HEALTH_HEALTHY = 1;   // daemon reachable, pool nominal
  HEALTH_DEGRADED = 2;  // reachable but something is off (pool error, saturation)
  HEALTH_DOWN = 3;      // no daemon / pool
}

// Status is the live snapshot.
message Status {
  Health health = 1;
  Pool pool = 2;        // live concurrency; absent when no daemon/pool is running
  string magus_version = 3;
  repeated Run runs = 4; // runs the daemon is executing right now (adopted dispatches)
  repeated Service services = 5; // long-running shared services the daemon is hosting right now
}

// Run is one in-flight invocation the daemon has adopted - a `magus run`/`affected`
// dispatch, keyed by its invocation id. It carries the per-target execution state a
// dashboard renders as a live run row, so the SAME status stream that shows the pool
// also shows what each run's targets are doing.
message Run {
  string inv = 1;                             // invocation id (inv...); deep-links to the run's live log
  string trigger = 2;                         // how the run was spawned: run | affected | ci | ...
  google.protobuf.Timestamp started_at = 3;   // when the invocation opened
  repeated TargetRun targets = 4;             // per-target execution state within this run
}

// TargetRun is the execution state of one target within a Run. It advances QUEUED ->
// RUNNING -> PASSED|FAILED|CACHED as the run emits journal events; a finished target
// carries its output reference and wall-clock duration.
message TargetRun {
  // State is where a target sits in its lifecycle.
  enum State {
    STATE_UNSPECIFIED = 0;
    QUEUED = 1;   // scheduled, not yet started
    RUNNING = 2;  // a subprocess is executing
    PASSED = 3;   // finished successfully
    FAILED = 4;   // finished with an error
    CACHED = 5;   // satisfied from cache (no work run)
  }
  string project = 1;                         // repo-relative project path
  string target = 2;                          // target name (as the CLI spells it)
  State state = 3;
  google.protobuf.Timestamp started_at = 4;   // when the target began running (unset while QUEUED)
  google.protobuf.Timestamp ended_at = 5;     // when the target finished (unset while active)
  string output_ref = 6;                      // output reference, once finished
  int64 duration_ms = 7;                      // wall-clock duration in ms, once finished
}

// Service is one long-running shared service the daemon is hosting right now, kept warm
// across invocations. It carries the derived identity (id/label/command/ports), the live
// state a dashboard renders, and how many targets currently depend on it.
message Service {
  string id = 1;                              // short service id (fingerprint prefix)
  string label = 2;                           // human name: image[:tag] or the binary basename
  string command = 3;                         // full process command, space-joined
  repeated string port = 4;                   // container-side published ports (empty if unknown)
  string state = 5;                           // starting | running | idle | failed
  int32 dependents = 6;                       // targets currently depending on this service
  google.protobuf.Timestamp started_at = 7;   // when the registry began starting this instance
}

// Pool is the live concurrency pool - the slots and the work occupying them.
message Pool {
  int32 parent_pid = 1;
  string daemon_version = 2;
  string mode = 3;             // "daemon" | "proc" | ""
  int32 capacity = 4;          // total concurrency slots (0 = unlimited)
  int32 running = 5;           // slots currently running
  int32 queued = 6;            // tasks queued for a slot
  repeated RunningTarget running_targets = 7; // what is running right now
  repeated Workspace workspaces = 8;
  repeated string affected = 9;
  Cache cache = 10;            // aggregate cache activity across the warm workspaces
}

// RunningTarget is one running unit of work in the pool.
message RunningTarget {
  repeated string args = 1;                  // the argument vector (carries the target/project)
  string workspace = 2;
  google.protobuf.Timestamp start_time = 3;  // when the running target started
  string step = 4;                           // the cache step currently executing
  string invocation = 5;                     // the invocation id (inv...) this running target belongs to; deep-links to its live log
}

// Workspace is one workspace the daemon has loaded.
message Workspace {
  string root = 1;
  google.protobuf.Timestamp load_time = 2;
  google.protobuf.Timestamp last_access_time = 3;
  Cache cache = 4;             // this workspace's cache activity
}

// Cache is live cache ACTIVITY: the hit/miss/error tallies a warm cache has served this
// session plus its real on-disk size. These are running counters (not static config like
// the cap or immutability), so a dashboard plots hit-rate over time by sampling the stream.
message Cache {
  int64 hits = 1;
  int64 misses = 2;
  int64 errors = 3;
  int64 size_bytes = 4;   // real on-disk size of the cache dir (0 = unknown/not computed)
  int32 size_cap_mb = 5;  // configured cap (MAGUS_CACHE_SIZE_MB; 0 = unlimited)
}

// StatusService serves the snapshot, and streams it for a live dashboard.
service StatusService {
  // GetStatus returns the current snapshot.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  // StreamStatus pushes a fresh snapshot whenever the pool changes (or on a heartbeat),
  // so a dashboard reflects what is running without polling.
  rpc StreamStatus(StreamStatusRequest) returns (stream StreamStatusResponse);
}

message GetStatusRequest {}
message GetStatusResponse {
  Status status = 1;
}
message StreamStatusRequest {}
message StreamStatusResponse {
  Status status = 1;
}
