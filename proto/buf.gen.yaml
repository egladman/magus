version: v2
# Managed mode sets the Go import prefix centrally (so every .proto need not carry an
# `option go_package`) - the generated packages live under the magus module prefix,
# consistent with the rest of the Go code.
managed:
  enabled: true
  # Don't rewrite protovalidate's Go package under our prefix - it is an external
  # dependency; its generated Go comes from the published module, not our tree.
  disable:
    - module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/egladman/magus/proto/gen/go
plugins:
  # Go only: a pinned, local protoc-gen-go run through the `go tool` directive (its version
  # is pinned in the root go.mod, so codegen is reproducible with no separate install). The
  # JS/TS client is generated by the WEBSITE from these same .proto (website/buf.gen.yaml),
  # so the consumer owns its codegen and bundles it from inside its own tree.
  - local: [go, tool, protoc-gen-go]
    out: gen/go
    opt: paths=source_relative
