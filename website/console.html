<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <!-- Theme-color: match the page background per scheme so the browser/OS chrome and the
       installed-app splash track the console's light/dark surface. -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#13171f" media="(prefers-color-scheme: dark)">
  <meta name="generator" content="magus">
  <!-- csp --><!-- injected at build time by renderConsole() in scribe.buzz; the console has no
       inline scripts (console.js and every surface bundle are external modules), and the default
       connect-src already allows loopback for the daemon streams. -->
  <title>Console — magus</title>
  <meta name="description" content="magus's native console: a tabbed, tiling shell hosting the log viewer, graph explorer, dashboard, and activity trail as live lenses on the daemon, over loopback.">
  <link rel="canonical" href="https://eli.gladman.cc/magus/console/">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
  <!-- PWA manifest: installs/themes the console as an app (shared site manifest at gen root). -->
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="stylesheet" href="../assets/pico.min.css">
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../site.css">
  <!-- ui-panels.css: the shared settings gear dropdown (also on the docs pages).
       console.css: the console-app shell (title bar, tab strip, panes, status bar, palette). -->
  <link rel="stylesheet" href="../ui-panels.css">
  <link rel="stylesheet" href="../console.css">
  <script src="../theme.js"></script>
</head>
<!-- The console is a single-page island: console.js builds the tab strip into #console-tabs, mounts one
     surface per tab (and per tiling pane) into #console-outlet, and swaps the active tab's status bar
     into #console-statusbar. This page is deliberately a THIN mount host - it supplies only the three
     slots plus the top-right settings gear; console.js owns everything inside them (it also calls
     initConsoleSettings() to wire the gear). Do NOT put #console-conn/#console-demo/#console-observing/
     #console-count/#offline-badge statically in the footer: main.ts's makeStatusBar() creates those
     PER TAB, and a static copy would duplicate their ids and break getElementById. -->
<body class="console-app console-fill">
  <header id="console-titlebar">
    <a class="brand" href="../index.html" title="Return to the magus site" aria-label="magus home">
      <picture><source srcset="../assets/hat.webp" type="image/webp"><img src="../assets/hat.png" width="41" height="30" alt=""></picture>
    </a>
    <div id="console-tabs"></div>
    <!-- The top-right actions: the settings gear + its dropdown (theme, daemon host, poll rate),
         injected by renderConsole() from renderSettingsPanel(true) - the same panel the standalone
         console pages wear. console.js's initConsoleSettings() wires it. -->
    <div id="console-actions"><!-- settings --></div>
  </header>
  <main id="console-outlet" class="container-fluid"></main>
  <!-- The per-tab status bar mounts here (console.js swaps the active tab's bar in); empty by design. -->
  <footer id="console-statusbar" class="console-statusbar"></footer>
  <script type="module" src="./console.js"></script>
</body>
</html>
